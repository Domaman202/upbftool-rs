name: Build and Publish Rust CLI

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (leave empty to only upload artifacts)'
        required: false
        type: string

env:
  APP_NAME: upbftool

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (musl, static)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: false
            artifact_name: ${{ env.APP_NAME }}-x86_64-unknown-linux-musl
            extension: ""

          # Linux ARM64 (musl, static, via cross)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_cross: true
            artifact_name: ${{ env.APP_NAME }}-aarch64-unknown-linux-musl
            extension: ""

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false
            artifact_name: ${{ env.APP_NAME }}-x86_64-pc-windows-msvc
            extension: .exe

          # macOS Intel
          - os: macos-13            # Intel runner
            target: x86_64-apple-darwin
            use_cross: false
            artifact_name: ${{ env.APP_NAME }}-x86_64-apple-darwin
            extension: ""

          # macOS Apple Silicon
          - os: macos-latest        # ARM64 runner
            target: aarch64-apple-darwin
            use_cross: false
            artifact_name: ${{ env.APP_NAME }}-aarch64-apple-darwin
            extension: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (if needed)
        if: matrix.use_cross == true
        run: cargo install cross

      - name: Install musl tools (Linux x86_64 only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build binary
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Prepare artifact
        shell: bash
        run: |
          BIN_PATH="target/${{ matrix.target }}/release/${{ env.APP_NAME }}${{ matrix.extension }}"
          ARTIFACT_NAME="${{ matrix.artifact_name }}${{ matrix.extension }}"
          cp "$BIN_PATH" "$ARTIFACT_NAME"
          echo "artifact_path=$ARTIFACT_NAME" >> $GITHUB_ENV

      - name: Upload artifact (GitHub Actions)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ env.artifact_path }}
          if-no-files-found: error

  # Создание релиза (опционально)
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.tag_name != ''
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: ${{ github.event.inputs.tag_name }}
          draft: false
          prerelease: false
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}