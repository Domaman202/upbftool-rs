name: Build and Publish Rust CLI

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Тег релиза (оставьте пустым, чтобы только сохранить артефакты)'
        required: false
        type: string

permissions:
  contents: write

env:
  APP_NAME: upbftool

jobs:
  build:
    name: Сборка для ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: false
            suffix: x86_64-unknown-linux-musl
            extension: ""

          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_cross: true
            suffix: aarch64-unknown-linux-musl
            extension: ""

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false
            suffix: x86_64-pc-windows-msvc
            extension: .exe

          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            use_cross: false
            suffix: x86_64-apple-darwin
            extension: ""

          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            use_cross: false
            suffix: aarch64-apple-darwin
            extension: ""

    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4

      - name: Установка Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Установка cross (если нужен для кросс-компиляции)
        if: matrix.use_cross == true
        run: cargo install cross

      - name: Установка musl-tools (только для Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Сборка бинарного файла
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Подготовка артефакта (копирование и переименование)
        shell: bash
        run: |
          BIN_PATH="target/${{ matrix.target }}/release/${{ env.APP_NAME }}${{ matrix.extension }}"
          ARTIFACT_NAME="${{ env.APP_NAME }}-${{ matrix.suffix }}${{ matrix.extension }}"
          cp "$BIN_PATH" "$ARTIFACT_NAME"
          echo "artifact_path=$ARTIFACT_NAME" >> $GITHUB_ENV

      - name: Загрузка артефакта в GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.suffix }}
          path: ${{ env.artifact_path }}
          if-no-files-found: error

  create-release:
    name: Создание GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.tag_name != ''
    steps:
      - name: Скачивание всех артефактов
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Создание релиза
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: ${{ github.event.inputs.tag_name }}
          draft: false
          prerelease: false
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
